name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 배포본은 백엔드/DB 없이 항상 mock 데이터로 동작
          VITE_USE_MOCK_API: "true"
          VITE_API_BASE_URL: ""

      # SPA 폴백: GitHub Pages 는 깊은 경로(/login 등) 직접요청/새로고침 시 파일을
      # 못 찾아 404 를 냅니다. 404.html 을 index.html 과 동일하게 두면 앱이 부팅돼
      # 클라이언트 라우터가 경로를 처리합니다.
      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
